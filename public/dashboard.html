<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <!-- Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <!-- Word -->
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

</head>

<body>

<!-- MESSAGE CARD -->
<div id="errorBox" style="display:none;">
  <div id="errorCard" class="message-card"></div>
</div>

<!-- HEADER -->
<div class="header" style="display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap">

  <h2 id="pageTitle">Dashboard</h2>

  <input 
    id="globalSearch" 
    placeholder="Search..." 
    onkeyup="applyFilters()" 
    style="padding:8px;width:220px;border-radius:5px;border:1px solid #ccc"
  >

  <div class="top-actions" style="display:flex;gap:10px">
    <button onclick="clearFilters()">Clear Filters</button>
    <button onclick="downloadExcel()">Download</button>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<!-- CARDS -->
<div class="cards">

  <div class="card green" onclick="filterByCard('awsDone')">
    <h3 id="awsDone">0</h3>
    <p>AWS Submitted</p>
  </div>

  <div class="card red" onclick="filterByCard('awsPending')">
    <h3 id="awsPending">0</h3>
    <p>AWS Pending</p>
  </div>

  <div class="card green" onclick="filterByCard('sssDone')">
    <h3 id="sssDone">0</h3>
    <p>SSS Submitted</p>
  </div>

  <div class="card red" onclick="filterByCard('sssPending')">
    <h3 id="sssPending">0</h3>
    <p>SSS Pending</p>
  </div>

  <div class="card blue">
    <h3 id="total">0</h3>
    <p>Total</p>
  </div>

</div>

<!-- TABLE -->
<div style="overflow:auto; max-height:70vh;">
<table>
<thead>
<tr>

  <th>Division<br><input id="f_division" onkeyup="applyFilters()"></th>
  <th>State<br><input id="f_state" onkeyup="applyFilters()"></th>
  <th>BM HQ<br><input id="f_bmhq" onkeyup="applyFilters()"></th>
  <th>Code<br><input id="f_code" onkeyup="applyFilters()"></th>
  <th>Name<br><input id="f_name" onkeyup="applyFilters()"></th>

  <th>Sales</th>
  <th>AWS</th>
  <th>SSS</th>

</tr>
</thead>

<tbody id="tableData"></tbody>
</table>
</div>

<!-- ===================== -->
<!-- FILE PREVIEW MODAL -->
<!-- ===================== -->
<div id="filePreviewModal" class="preview-modal hidden">

  <div class="preview-container" style="
      display:flex;
      flex-direction:column;
      max-height:80vh;
  ">

    <!-- HEADER -->
    <div class="preview-header">
      <span>File Preview</span>
      <button onclick="closePreview()">✖</button>
    </div>

    <!-- BODY (SCROLLABLE) -->
    <div class="preview-body" style="
        flex:1;
        overflow:auto;
        padding:10px;
    ">
      <div id="previewFrame"></div>
    </div>

    <!-- FOOTER (ALWAYS VISIBLE) -->
    <div class="preview-footer" style="
        background:#fff;
        padding:10px;
        text-align:right;
        border-top:1px solid #ddd;
    ">
      <button onclick="submitFile()" class="submit-btn">Submit</button>
    </div>

  </div>

</div>

<script src="app.js"></script>

<script>
  const role = localStorage.getItem("role");

  document.getElementById("pageTitle").innerText =
    role === "admin" ? "Admin Dashboard" : "User Dashboard";
</script>

</body>
</html>
