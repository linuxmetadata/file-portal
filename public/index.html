<!DOCTYPE html>
<html>
<head>
<title>Statement Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f6fb;
}

/* HEADER */
.header {
  background: linear-gradient(90deg,#6a11cb,#2575fc);
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LOGIN */
.login {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box {
  background:white;
  padding:30px;
  border-radius:10px;
  width:300px;
}

input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
}

/* DASHBOARD */
.container {
  padding:20px;
}

.cards {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.card {
  flex:1;
  min-width:150px;
  padding:15px;
  border-radius:10px;
  color:white;
  text-align:center;
}

.green{background:#2ecc71;}
.orange{background:#ff6f00;}
.blue{background:#2c3e50;}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:white;
}

th, td {
  padding:10px;
  border:1px solid #ddd;
  text-align:center;
}

button {
  padding:6px 10px;
  margin:2px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.upload {background:#3498db;color:white;}
.view {background:#2ecc71;color:white;}
.delete {background:#e74c3c;color:white;}
.download {background:#8e44ad;color:white;}

.status {
  padding:4px 8px;
  border-radius:5px;
  color:white;
}

.pending {background:#ff6f00;}
.done {background:#2ecc71;}

.loader {
  display:none;
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
  color:white;
  font-size:20px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <div class="login-box">
    <h3>Login</h3>
    <input id="email" placeholder="Enter ID">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app" style="display:none">

<div class="header">
  <div>Statement Portal</div>
  <div>
    <button onclick="downloadExcel()">Excel</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

<!-- SEARCH -->
<input id="search" placeholder="Search..." onkeyup="filterTable()">

<!-- CARDS -->
<div class="cards">
  <div class="card green" id="awsSub"></div>
  <div class="card orange" id="awsPend"></div>
  <div class="card green" id="sssSub"></div>
  <div class="card orange" id="sssPend"></div>
  <div class="card blue" id="total"></div>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>State</th>
<th>Code</th>
<th>Name</th>
<th>AWS</th>
<th>SSS</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

</div>

<input type="file" id="fileInput" style="display:none"/>
<div class="loader" id="loader">Uploading...</div>

<script>
let token = localStorage.getItem("token");
let role = "admin";

let selectedFile = null;
let currentCode = "";
let currentType = "";

/* LOGIN */
async function login(){
  const email = document.getElementById("email").value;

  const res = await fetch("/auth/user-login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:email})
  });

  const data = await res.json();

  token = data.token;
  role = data.role || "user";

  localStorage.setItem("token",token);

  startApp();
}

/* START */
function startApp(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";
  load();
}

/* LOAD */
async function load(){
  tbody.innerHTML="";

  const s = await fetch("/data/stats",{headers:{Authorization:"Bearer "+token}});
  const stats = await s.json();

  awsSub.innerText="AWS Submitted: "+stats.awsSubmitted;
  awsPend.innerText="AWS Pending: "+stats.awsPending;
  sssSub.innerText="SSS Submitted: "+stats.sssSubmitted;
  sssPend.innerText="SSS Pending: "+stats.sssPending;
  total.innerText="Total: "+stats.total;

  const r = await fetch("/data/list",{headers:{Authorization:"Bearer "+token}});
  const list = await r.json();

  list.forEach(row=>{
    tbody.innerHTML += `
      <tr>
        <td>${row.state}</td>
        <td>${row.code}</td>
        <td>${row.name}</td>

        <td id="aws-${row.code}">
          ${renderCell(row.awsUploaded,row.awsFileId,row.code,"AWS")}
        </td>

        <td id="sss-${row.code}">
          ${renderCell(row.sssUploaded,row.sssFileId,row.code,"SSS")}
        </td>
      </tr>
    `;
  });
}

/* CELL */
function renderCell(uploaded,fileId,code,type){
  if(uploaded){
    return `
      <span class="status done">Submitted</span><br>
      <button class="view" onclick="viewFile('${fileId}')">View</button>
      <button class="download" onclick="downloadFile('${fileId}')">Download</button>
      ${role==="admin" ? `<button class="delete" onclick="deleteFile('${fileId}')">Delete</button>`:""}
    `;
  } else {
    return `
      <span class="status pending">Pending</span><br>
      <button class="upload" onclick="chooseFile('${code}','${type}')">Choose File</button>
    `;
  }
}

/* FILE SELECT */
function chooseFile(code,type){
  currentCode=code;
  currentType=type;
  fileInput.click();
}

fileInput.addEventListener("change",function(){
  selectedFile=this.files[0];

  const cell=(currentType==="AWS"?"aws-":"sss-")+currentCode;

  document.getElementById(cell).innerHTML=`
    <button class="view" onclick="previewFile()">View</button>
    <button class="upload" onclick="submitUpload()">Submit</button>
  `;
});

/* PREVIEW */
function previewFile(){
  window.open(URL.createObjectURL(selectedFile));
}

/* UPLOAD */
async function submitUpload(){
  const formData=new FormData();
  formData.append("file",selectedFile);
  formData.append("type",currentType);
  formData.append("code",currentCode);

  loader.style.display="flex";

  await fetch("/upload",{
    method:"POST",
    headers:{Authorization:"Bearer "+token},
    body:formData
  });

  loader.style.display="none";

  load();
}

/* VIEW */
function viewFile(id){
  window.open(`/data/view/${id}`);
}

/* DOWNLOAD */
function downloadFile(id){
  window.open(`/data/download/${id}`);
}

/* DELETE */
async function deleteFile(id){
  if(!confirm("Delete?")) return;

  await fetch(`/data/delete/${id}`,{
    method:"DELETE",
    headers:{Authorization:"Bearer "+token}
  });

  load();
}

/* EXCEL */
function downloadExcel(){
  window.open("/data/excel");
}

/* SEARCH */
function filterTable(){
  const val=document.getElementById("search").value.toLowerCase();
  document.querySelectorAll("tbody tr").forEach(tr=>{
    tr.style.display=tr.innerText.toLowerCase().includes(val)?"":"none";
  });
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  location.reload();
}

/* AUTO LOGIN */
if(token){
  startApp();
}
</script>

</body>
</html>
