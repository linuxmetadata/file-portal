<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Linux Labs Portal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2a5c, #1f4ea3);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #fff;
      padding: 30px;
      width: 360px;
      border-radius: 14px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
      margin: 10px 0;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(to right, #2b7cff, #6c2bd9);
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    .admin-toggle {
      margin-top: 15px;
      color: #2b7cff;
      cursor: pointer;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Linux Labs</h2>
  <div class="subtitle">SSS & AWS Submission Portal — Field Login</div>

  <!-- USER LOGIN -->
  <div id="userLogin">
    <input id="userId" placeholder="Enter ID" />
    <button onclick="userLogin()">Continue</button>

    <div class="admin-toggle" onclick="showAdmin()">
      🔐 Admin Login
    </div>
  </div>

  <!-- ADMIN LOGIN -->
  <div id="adminLogin" class="hidden">
    <input id="email" placeholder="Enter Email" />
    <input id="password" type="password" placeholder="Enter Password" />

    <button onclick="adminLogin()">Login</button>

    <div class="admin-toggle" onclick="showUser()">
      ← Back to User Login
    </div>
  </div>

</div>

<script>
  function showAdmin() {
    document.getElementById("userLogin").classList.add("hidden");
    document.getElementById("adminLogin").classList.remove("hidden");
  }

  function showUser() {
    document.getElementById("adminLogin").classList.add("hidden");
    document.getElementById("userLogin").classList.remove("hidden");
  }

  /* =========================
     USER LOGIN
  ========================= */
  async function userLogin() {
    const id = document.getElementById("userId").value;

    const res = await fetch("/auth/user-login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id })
    });

    const data = await res.json();

    if (data.success) {

      // ✅ IMPORTANT FIX
      localStorage.setItem("role", "user");

      window.location.href = "/dashboard.html";
    } else {
      alert(data.message || "Invalid ID");
    }
  }

  /* =========================
     ADMIN LOGIN
  ========================= */
  async function adminLogin() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/auth/admin-login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {

      // ✅ IMPORTANT FIX
      localStorage.setItem("role", "admin");

      window.location.href = "/admin.html";
    } else {
      alert("Invalid admin login");
    }
  }
</script>

</body>
</html>
