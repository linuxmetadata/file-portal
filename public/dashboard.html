<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MESSAGE CARD -->
<div id="errorBox" style="display:none; padding:15px;">
  <div id="errorCard" class="message-card">
    Message
  </div>
</div>

<!-- HEADER -->
<div class="header" style="display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap">

  <h2 id="pageTitle">Dashboard</h2>

  <!-- SEARCH -->
  <input 
    id="globalSearch" 
    placeholder="Search..." 
    onkeyup="applyFilters()" 
    style="padding:8px;width:220px;border-radius:5px;border:1px solid #ccc"
  >

  <!-- ACTIONS -->
  <div class="top-actions" style="display:flex;gap:10px">
    <button onclick="clearFilters()">Clear Filters</button>
    <button onclick="downloadExcel()">Download</button>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<!-- CARDS -->
<div class="cards">

  <div class="card green" onclick="filterByCard('awsDone')">
    <h3 id="awsDone">0</h3>
    <p>AWS Submitted</p>
  </div>

  <div class="card red" onclick="filterByCard('awsPending')">
    <h3 id="awsPending">0</h3>
    <p>AWS Pending</p>
  </div>

  <div class="card green" onclick="filterByCard('sssDone')">
    <h3 id="sssDone">0</h3>
    <p>SSS Submitted</p>
  </div>

  <div class="card red" onclick="filterByCard('sssPending')">
    <h3 id="sssPending">0</h3>
    <p>SSS Pending</p>
  </div>

  <div class="card blue">
    <h3 id="total">0</h3>
    <p>Total</p>
  </div>

</div>

<!-- TABLE -->
<div style="overflow:auto; max-height:70vh;">

<table>
<thead>
<tr>

  <th>
    Division<br>
    <input id="f_division" placeholder="Filter division" onkeyup="applyFilters()">
  </th>

  <th>
    State<br>
    <input id="f_state" placeholder="Filter state" onkeyup="applyFilters()">
  </th>

  <th>
    BM HQ<br>
    <input id="f_bmhq" placeholder="Filter BM HQ" onkeyup="applyFilters()">
  </th>

  <th>
    Code<br>
    <input id="f_code" placeholder="Filter code" onkeyup="applyFilters()">
  </th>

  <th>
    Name<br>
    <input id="f_name" placeholder="Filter name" onkeyup="applyFilters()">
  </th>

  <th>Sales</th>
  <th>AWS</th>
  <th>SSS</th>

</tr>
</thead>

<tbody id="tableData"></tbody>
</table>

</div>

<script src="app.js"></script>

<script>
  const role = localStorage.getItem("role");

  if (role === "admin") {
    document.getElementById("pageTitle").innerText = "Admin Dashboard";
  } else {
    document.getElementById("pageTitle").innerText = "User Dashboard";
  }
</script>

</body>
</html>
